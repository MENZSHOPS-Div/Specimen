<body>
    
  <style>

    /* เต็มจอ + ห้ามสกอลล์ */
html, body{
  height: 100%;
  margin: 0;
  overflow: hidden; /* ไม่ให้มีสกอลล์ */
}

.page{
  width: 100vw;
  height: 100dvh;              /* เต็มจอ */
  display: flex;
  justify-content: center;     /* กลางแนวนอน */
  align-items: center;         /* กลางแนวตั้ง */
  position: relative;
  overflow: hidden;

  background-image: url("https://img2.pic.in.th/38900cc268a5fe8c8089a0c988c05578.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* (ไม่บังคับ) ใส่ overlay ให้ตัวหนังสืออ่านง่ายขึ้น */
.page::before{
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.35);
  pointer-events:none;
}

.login-card{
  position: relative;
  z-index: 1; /* ให้อยู่เหนือ overlay */
}
 

/* คอนเทนเนอร์หลักเต็มจอ */
.app {
  width: 100vw;
  height: 100dvh;       /* ใช้ dvh เพื่อให้พอดีจอจริงบนมือถือ */
  overflow: hidden;     /* กันลูกหลานทำให้เกิดสกอลล์ */
}
    .cascading-right {
      margin-right: -50px;
    }

    @media (max-width: 991.98px) {
      .cascading-right {
        margin-right: 0;
      }
    }
:root {
  --primary: #000000;
  --secondary: #FFFFFF;
  --accent: #14bce6;
  --shadow: 8px 8px 0px var(--primary);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Courier New', monospace;
}



.login-container {
  width: 100%;
  max-width: 400px;
  border: 1px solid var(--primary);
  padding: 40px 30px;
  background-color: var(--secondary);
  box-shadow: var(--shadow);
  position: relative;
  border-radius: 12px;

 
}

.login-container::before {
  content: '';
  position: absolute;
  top: 6px;
  left: 6px;
  right: -6px;
  bottom: -6px;
  border: 1px solid var(--primary);
  z-index: -1;
  border-radius: 12px;
}

h1 {
  color: var(--primary);
  margin-bottom: 30px;
  font-size: 28px;
  font-weight: 700;
  text-align: center;
}

.input-group {
  margin-bottom: 20px;
  position: relative;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
  color: var(--primary);
}

input {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid var(--primary);
  background-color: var(--secondary);
  font-size: 16px;
  outline: none;
  transition: all 0.3s;

}

input:focus {
  box-shadow: 4px 4px 0px var(--primary);
}

button {
  width: 100%;
  padding: 12px;
  background-color: var(--accent);
  color: var(--secondary);
  border: 2px solid var(--primary);
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.3s;
}

button:hover {
  box-shadow: 4px 4px 0px var(--primary);
  transform: translate(-2px, -2px);
}

.divider {
  display: flex;
  align-items: center;
  margin: 25px 0;
  color: var(--primary);
  font-weight: bold;
}

.divider::before, .divider::after {
  content: "";
  flex: 1;
  border-bottom: 2px solid var(--primary);
  margin: 0 10px;
}

.social-login {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.social-btn {
  width: 50px;
  height: 50px;
  border: 2px solid var(--primary);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: all 0.3s;
}

.social-btn:hover {
  box-shadow: 4px 4px 0px var(--primary);
  transform: translate(-2px, -2px);
}

.footer {
  text-align: center;
  margin-top: 20px;
  color: var(--primary);
}

.footer a {
  color: var(--primary);
  font-weight: bold;
  text-decoration: underline;
}
.login-card{
  position: relative;
  z-index: 1; /* ให้อยู่เหนือ overlay */
}
  </style>
<div class="page container-fluid p-0"><div class="page container-fluid p-0">
<div class="login-card">
  <div class="login-container">
  
        <h1>LOGIN</h1>
        
        <div class="input-group">
            <label for="email">Username</label>
            <input type="email" id="email" placeholder="">
        </div>
        
        <div class="input-group">
            <label for="password">PASSWORD</label>
            <input type="password" id="password" placeholder="">
        </div>

  </div>
